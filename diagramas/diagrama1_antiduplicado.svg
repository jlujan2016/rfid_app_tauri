<line x1="440" y1="422" x2="590" y2="422" class="arr" marker-end="url(#arrow)"/>
<text x="515" y="410" text-anchor="middle" class="ts">sí</text>
<rect x="590" y="400" width="80" height="44" rx="8" class="box"/>
<text x="630" y="426" text-anchor="middle" class="ts">Sale</text>

<line x1="350" y1="454" x2="350" y2="490" class="arr" marker-end="url(#arrow)"/>
<text x="366" y="474" class="ts">no</text>

<rect x="180" y="490" width="340" height="56" rx="8" class="box-teal"/>
