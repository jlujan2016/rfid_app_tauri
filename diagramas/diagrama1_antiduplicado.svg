<text x="350" y="530" text-anchor="middle" class="ts">last_seen_salidas evita repetidos</text>

<line x1="350" y1="546" x2="350" y2="582" class="arr" marker-end="url(#arrow)"/>

<polygon points="350,582 440,614 350,646 260,614" class="dia"/>
<text x="350" y="614" text-anchor="middle" class="ts">¿Dentro de 5s?</text>

<line x1="440" y1="614" x2="590" y2="614" class="arr" marker-end="url(#arrow)"/>
<text x="515" y="602" text-anchor="middle" class="ts">sí</text>
<rect x="590" y="592" width="80" height="44" rx="8" class="box"/>
<text x="630" y="618" text-anchor="middle" class="ts">Libera lock</text>

<line x1="350" y1="646" x2="350" y2="682" class="arr" marker-end="url(#arrow)"/>
<text x="366" y="666" class="ts">no</text>

<rect x="180" y="682" width="340" height="56" rx="8" class="box-coral"/>
<text x="350" y="704" text-anchor="middle" class="th">Verifica es_uso_interno</text>
<text x="350" y="722" text-anchor="middle" class="ts">INSERT en LecturasRFID_Salidas</text>
