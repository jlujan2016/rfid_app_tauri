<svg width="700" height="780" viewBox="0 0 700 780" xmlns="http://www.w3.org/2000/svg">
<rect width="700" height="780" fill="#ffffff"/>
<defs>
<marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
<path d="M2 1L8 5L2 9" fill="none" stroke="#3d3d3a" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
</marker>
</defs>
<style>
text { font-family: Arial, sans-serif; fill: #1a1a1a; }
.th { font-size: 14px; font-weight: 600; }
.ts { font-size: 12px; fill: #555; }
.box { fill: #f3f4f6; stroke: #9ca3af; stroke-width: 1; }
.box-blue { fill: #dbeafe; stroke: #60a5fa; stroke-width: 1; }
.box-teal { fill: #ccfbf1; stroke: #2dd4bf; stroke-width: 1; }
.box-coral { fill: #fee2e2; stroke: #f87171; stroke-width: 1; }
.arr { stroke: #3d3d3a; stroke-width: 1.5; fill: none; }
.dia { fill: #ffffff; stroke: #9ca3af; stroke-width: 1; }
</style>

<rect x="250" y="30" width="200" height="44" rx="8" class="box"/>
<text x="350" y="56" text-anchor="middle" class="th">Tag leído por antena 2</text>

<line x1="350" y1="74" x2="350" y2="110" class="arr" marker-end="url(#arrow)"/>

<rect x="200" y="110" width="300" height="56" rx="8" class="box-blue"/>
