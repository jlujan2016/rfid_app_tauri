<text x="500" y="220" text-anchor="middle" class="ts">sí</text>
<rect x="570" y="210" width="100" height="44" rx="8" class="box"/>
<text x="620" y="236" text-anchor="middle" class="ts">Descarta</text>

<line x1="350" y1="262" x2="350" y2="298" class="arr" marker-end="url(#arrow)"/>
<text x="366" y="282" class="ts">no</text>

<rect x="180" y="298" width="340" height="56" rx="8" class="box-teal"/>
